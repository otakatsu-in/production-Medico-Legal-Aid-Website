kind = "web"
previewPath = "/"
title = "MedicoLegalAid"
version = "1.0.0"
id = "artifacts/medicolegalaid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23417

[services.development]
run = "pnpm --filter @workspace/medicolegalaid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medicolegalaid", "run", "build" ]
publicDir = "artifacts/medicolegalaid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23417"
BASE_PATH = "/"
